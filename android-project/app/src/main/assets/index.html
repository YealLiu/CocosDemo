<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2a1f3d">
    <title>启蒙 - Roguelike卡牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #2a1f3d 0%, #1a1225 100%);
        }
        
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* 加载画面 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2a1f3d 0%, #1a1225 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-title {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 20px;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(157, 78, 221, 0.5);
        }
        
        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #9d4edd, #c77dff);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        .loading-text {
            margin-top: 15px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* 游戏画布 */
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* 横屏提示 */
        @media (orientation: landscape) and (max-height: 500px) {
            body::before {
                content: "请使用竖屏模式游玩";
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: #2a1f3d;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                color: #fff;
                padding: 40px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-title">启蒙</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress"></div>
        </div>
        <div class="loading-text">正在加载资源...</div>
    </div>
    
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
    </div>

    <script src="game-cocos.js"></script>
</body>
</html>
